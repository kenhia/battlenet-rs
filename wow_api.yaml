Connected_Realm: # ---------------------------------------------------------
  ConnectedRealmsIndex:
    endpoint: data/wow/connected-realm/index
    namespace: Dynamic
    description: Returns an index of connected realms.
    struct:
        links._links: LinksRef
        connected_realms: Vec<HrefLink>

  ConnectedRealm:
    endpoint: data/wow/connected-realm/{id}
    url_args: Id
    namespace: Dynamic
    description: Returns a single connected realm by ID.
    struct:
        links._links: LinksRef
        id: u32
        has_queue: bool
        status: TypeAndName
        population: TypeAndName
        realms: Vec<RealmLong>











Character_Profile: # --------------------------------------------------------
  CharacterProfileStatus:
    endpoint: profile/wow/character/{realm_slug}/{name}/status
    url_args: Player
    namespace: Profile
    description: Returns the status and a unique ID for a character.
    struct:
        id: u64
        is_valid: bool

  CharacterProfile:
    endpoint: profile/wow/character/{realm_slug}/{name}
    url_args: Player
    namespace: Profile
    description: Returns a single character by name and realm.
    struct:
        links._links: LinksRef
        id: u64
        name: String
        gender: TypeAndName
        faction: TypeAndName
        race: NameAndId
        character_class: NameAndId
        active_spec: TypeAndName
        realm: Realm
        guild: Option<CharacterGuild>
        level: u64
        experience: u64
        achievement_points: u64
        last_login_timestamp: u64
        average_item_level: u64
        equipped_item_level: u64
        active_title: Option<CharacterTitle>
        achievements: HrefLink
        titles: HrefLink
        pvp_summary: HrefLink
        encounters: HrefLink
        media: HrefLink
        specializations: HrefLink
        statistics: HrefLink
        mythic_keystone_profile: HrefLink
        equipment: HrefLink
        appearance: HrefLink
        collections: HrefLink
        reputations: HrefLink
        quests: HrefLink
        achievements_statistics: HrefLink
        professions: HrefLink

Wow_Token: # ---------------------------------------------------------------
  _NO_CORE: true
  WowTokenIndex:
    endpoint: data/wow/token/index
    namespace: Dynamic
    description: Returns the current WoW Token price.
    struct:
        price: i64
        last_updated_timestamp: i64
